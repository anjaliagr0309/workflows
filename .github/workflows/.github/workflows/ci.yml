name: CI  # This name matters for the badge!

on:
  push:
    branches: [ main ]  # Triggers on pushes to main
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Lets you manually trigger (key for testing!)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Success step
      run: echo "All good!"  # Always passes
