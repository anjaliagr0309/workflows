name: Daily Commit Bot

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily log 21f2000855@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date -u)" > daily-log.txt

      - name: Configure git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "21f2000855@ds.study.iitm.ac.in"

      - name: Commit and push changes
        run: |
          git add daily-log.txt
          git commit -m "Daily automated commit [$(date -u)]" || echo "No changes"
          git push
