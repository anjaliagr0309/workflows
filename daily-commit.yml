name: Daily Commit Bot

on:
  schedule:
    # Runs every day at 03:30 UTC
    - cron: "30 3 * * *"
  workflow_dispatch:  # allows manual run for testing
    inputs: {}

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repo code so we can edit it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Change (or create) a small file so there is something to commit
      - name: Update daily log 21f2000855@ds.study.iitm.ac.in
        run: |
          echo "Last run at $(date -u)" > daily-log.txt

      # Step 3: Set git user info so Git can create a commit
        # (You can change the name/email if you want, but it's fine like this)
      - name: Configure git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "21f2000855@ds.study.iitm.ac.in"

      # Step 4: Commit and push the change (if there is any change)
      - name: Commit and push changes
        run: |
          git add daily-log.txt
          # If nothing changed, don't fail the job
          git commit -m "Daily automated commit" || echo "No changes to commit"
          git push
